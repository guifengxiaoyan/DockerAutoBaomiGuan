version: '3.8'

services:
  autobaomiguan:
    build: .
    image: guifengxiaoyan/autobaomiguan:latest
    container_name: autobaomiguan
    ports:
      - "3000:3000"
    volumes:
      - ./credentials.json:/app/credentials.json
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
